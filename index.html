<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>To Do List Pro</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
  :root {
    --primary: #4f46e5;
    --primary-light: #818cf8;
    --primary-dark: #3730a3;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #1e293b;
    --text-muted: #64748b;
    --shadow: 0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    background: linear-gradient(135deg, #4338ca 0%, #6366f1 60%, #818cf8 100%);
    padding: 0 32px;
    display: flex;
    align-items: stretch;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    box-shadow: 0 4px 20px rgba(67,56,202,.45);
    min-height: 62px;
  }
  .header-brand {
    display: flex; align-items: center; gap: 12px; padding: 12px 0;
  }
  .header-brand-icon {
    width: 36px; height: 36px; border-radius: 10px;
    background: rgba(255,255,255,.2); backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem; flex-shrink: 0; border: 1px solid rgba(255,255,255,.3);
  }
  .header-brand-text { display: flex; flex-direction: column; line-height: 1.25; }
  .header-brand-title { font-size: 1rem; font-weight: 700; color: #fff; letter-spacing: -.2px; }
  .header-brand-sub   { font-size: .68rem; font-weight: 500; color: rgba(255,255,255,.7); letter-spacing: .06em; text-transform: uppercase; }
  .header-actions { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; padding: 10px 0; }
  #sync-status {
    font-size: .76rem; font-weight: 600; padding: 4px 10px;
    border-radius: 20px; background: rgba(255,255,255,.15);
    color: #fff; white-space: nowrap; border: 1px solid rgba(255,255,255,.25);
  }
  header .btn-ghost {
    background: rgba(255,255,255,.15); color: #fff;
    border: 1px solid rgba(255,255,255,.3);
  }
  header .btn-ghost:hover { background: rgba(255,255,255,.28); }
  header .btn-success { background: #10b981; border: none; }
  header .btn-success:hover { background: #059669; }
  header .btn-primary { background: #fff; color: var(--primary-dark); border: none; font-weight: 700; }
  header .btn-primary:hover { background: #e0e7ff; }
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: 8px; border: none;
    font-size: .875rem; font-weight: 600; cursor: pointer;
    transition: all .15s;
  }
  .btn:hover { transform: translateY(-1px); }
  .btn-primary   { background: #fff; color: var(--primary); }
  .btn-primary:hover { background: #e0e7ff; }
  .btn-success   { background: var(--success); color: #fff; }
  .btn-success:hover { background: #059669; }
  .btn-warning   { background: var(--warning); color: #fff; }
  .btn-warning:hover { background: #d97706; }
  .btn-ghost     { background: rgba(255,255,255,.15); color: #fff; }
  .btn-ghost:hover { background: rgba(255,255,255,.25); }
  .btn-danger    { background: var(--danger); color: #fff; }
  .btn-sm        { padding: 5px 10px; font-size: .8rem; }

  /* ── Layout ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 24px 16px; }

  .two-col {
    display: grid; grid-template-columns: 1fr 1fr; gap: 20px; align-items: start;
  }
  .col-header {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 14px; padding-bottom: 10px;
    border-bottom: 2px solid var(--border);
  }
  .col-header h2 { font-size: 1rem; font-weight: 700; }
  .col-header .col-count {
    background: var(--border); color: var(--text-muted);
    font-size: .72rem; font-weight: 700; padding: 2px 7px;
    border-radius: 100px;
  }
  .col-tasks { display: flex; flex-direction: column; gap: 12px; }

  @media (max-width: 860px) {
    .two-col { grid-template-columns: 1fr; }
  }

  /* ── Stats bar ── */
  .stats {
    display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap;
  }
  .stat-card {
    background: var(--card); border-radius: 10px;
    padding: 8px 16px; display: flex; align-items: center; gap: 8px;
    box-shadow: var(--shadow); border: 1px solid var(--border);
    flex: 1; min-width: 80px;
  }
  .stat-card .num { font-size: 1.4rem; font-weight: 800; line-height: 1; }
  .stat-card .lbl { font-size: .7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
  .stat-card.open   .num { color: var(--primary); }
  .stat-card.overdue .num { color: var(--danger); }
  .stat-card.done   .num { color: var(--success); }
  .stat-card.total  .num { color: var(--text-muted); }

  /* ── Toolbar ── */
  .toolbar {
    display: flex; align-items: center; gap: 10px;
    flex-wrap: wrap; margin-bottom: 20px;
  }
  .toolbar input[type=search] {
    flex: 1; min-width: 180px; padding: 9px 14px;
    border: 1px solid var(--border); border-radius: 8px;
    font-size: .9rem; background: var(--card);
    outline: none; transition: border-color .15s;
  }
  .toolbar input[type=search]:focus { border-color: var(--primary); }
  .toolbar select {
    padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; background: var(--card);
    font-size: .85rem; cursor: pointer; outline: none;
  }

  /* ── Tabs ── */
  .tabs {
    display: flex; gap: 4px; margin-bottom: 20px;
    border-bottom: 2px solid var(--border);
  }
  .tab {
    padding: 10px 18px; border: none; background: none;
    font-size: .9rem; font-weight: 600; cursor: pointer;
    color: var(--text-muted); border-bottom: 2px solid transparent;
    margin-bottom: -2px; border-radius: 6px 6px 0 0;
    transition: all .15s;
  }
  .tab:hover { background: #f1f5f9; color: var(--text); }
  .tab.active { color: var(--primary); border-bottom-color: var(--primary); }

  /* ── Op Status panel (right side) ── */
  .op-status-panel {
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: 6px;
    padding: 12px 14px; border-left: 1px solid var(--border);
    min-width: 110px; flex-shrink: 0; background: #fafafa;
    border-radius: 0 var(--radius) 0 0;
  }
  .op-status-panel .panel-lbl {
    font-size: .65rem; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-muted); font-weight: 700; margin-bottom: 2px;
  }
  .op-radio {
    display: flex; align-items: center; gap: 7px;
    width: 100%; cursor: pointer; padding: 5px 8px;
    border-radius: 7px; transition: background .12s;
    user-select: none;
  }
  .op-radio:hover { background: var(--border); }
  .op-radio input[type=radio] { display: none; }
  .op-radio-dot {
    width: 13px; height: 13px; border-radius: 50%;
    border: 2px solid currentColor; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .op-radio input:checked + .op-radio-dot::after {
    content: ''; width: 6px; height: 6px;
    border-radius: 50%; background: currentColor; display: block;
  }
  .op-radio-label { font-size: .78rem; font-weight: 600; }

  /* Colors per status */
  .op-radio.alancer  { color: #6366f1; }
  .op-radio.encours  { color: #f59e0b; }
  .op-radio.bloquee  { color: #ef4444; }
  .op-radio.alancer:has(input:checked)  { background: #e0e7ff; }
  .op-radio.encours:has(input:checked)  { background: #fef3c7; }
  .op-radio.bloquee:has(input:checked)  { background: #fee2e2; }

  /* Big pill on card header for quick read */
  .op-pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 3px 10px; border-radius: 100px;
    font-size: .72rem; font-weight: 700; letter-spacing: .2px;
  }
  .op-pill.alancer  { background: #e0e7ff; color: #4338ca; }
  .op-pill.encours  { background: #fef3c7; color: #92400e; }
  .op-pill.bloquee  { background: #fee2e2; color: #b91c1c; }

  .task-card { display: flex; flex-direction: column; width: 100%; min-width: 0; }
  .task-card-top { display: flex; min-width: 0; overflow: hidden; }
  .task-card-body { flex: 1; min-width: 0; overflow: hidden; }

  .task-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); box-shadow: var(--shadow);
    overflow: hidden; transition: box-shadow .15s;
  }
  .task-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,.1); }
  .task-card.done  { opacity: .65; }
  .task-card.overdue { border-left: 4px solid var(--danger); }
  .task-card.priority-high  { border-left: 4px solid var(--danger); }
  .task-card.priority-medium{ border-left: 4px solid var(--warning); }
  .task-card.priority-low   { border-left: 4px solid var(--success); }
  .task-card.done { border-left: 4px solid #cbd5e1; }

  .task-header {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; min-height: 44px;
  }
  .task-check {
    width: 22px; height: 22px; border-radius: 50%;
    border: 2px solid var(--border); cursor: pointer;
    flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s; background: var(--card);
  }
  .task-check:hover { border-color: var(--success); }
  .task-check.checked { background: var(--success); border-color: var(--success); }
  .task-check.checked::after { content: '✓'; color: #fff; font-size: .75rem; font-weight: 700; }

  .task-main { flex: 1; min-width: 0; }
  .task-title {
    font-size: .93rem; font-weight: 600;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    cursor: pointer; flex: 1; min-width: 0;
  }
  .done .task-title { text-decoration: line-through; color: var(--text-muted); }
  .task-deadline-chip {
    font-size: .72rem; font-weight: 700; padding: 2px 8px; border-radius: 20px;
    white-space: nowrap; flex-shrink: 0;
    background: #f1f5f9; color: var(--text-muted);
  }
  .task-deadline-chip.urgent { background: #fee2e2; color: var(--danger); }
  .task-deadline-chip.soon   { background: #fef3c7; color: #92400e; }
  .task-toggle-btn {
    width: 26px; height: 26px; border: 1px solid var(--border);
    background: var(--card); border-radius: 6px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: .7rem; transition: all .2s; flex-shrink: 0; color: var(--text-muted);
  }
  .task-toggle-btn:hover { background: #f1f5f9; }
  .task-toggle-btn.open { background: var(--primary); color: #fff; border-color: var(--primary); }
  .task-desc {
    font-size: .85rem; color: var(--text-muted);
    margin-top: 3px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .task-badges { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 2px 8px; border-radius: 100px; font-size: .72rem; font-weight: 600;
  }
  .badge-cat    { background: #e0e7ff; color: var(--primary-dark); }
  .badge-prio-high   { background: #fee2e2; color: #b91c1c; }
  .badge-prio-medium { background: #fef3c7; color: #92400e; }
  .badge-prio-low    { background: #d1fae5; color: #065f46; }
  .badge-deadline  { background: #f1f5f9; color: var(--text-muted); }
  .badge-deadline.urgent { background: #fee2e2; color: var(--danger); }
  .badge-deadline.soon   { background: #fef3c7; color: #92400e; }
  .badge-done { background: #d1fae5; color: #065f46; }

  .task-actions {
    display: flex; gap: 6px; align-items: flex-start;
    flex-shrink: 0;
  }
  .icon-btn {
    width: 30px; height: 30px; border: 1px solid var(--border);
    background: var(--card); border-radius: 6px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: .85rem; transition: all .15s;
  }
  .icon-btn:hover { background: #f1f5f9; }
  .icon-btn.del:hover { background: #fee2e2; border-color: var(--danger); }

  .task-footer {
    display: flex; gap: 12px; padding: 0 12px 10px;
    font-size: .72rem; color: var(--text-muted); flex-wrap: wrap;
  }
  .task-footer span { display: flex; align-items: center; gap: 4px; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.45);
    display: flex; align-items: center; justify-content: center;
    z-index: 1000; padding: 16px;
    opacity: 0; pointer-events: none; transition: opacity .2s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--card); border-radius: 16px;
    width: 100%; max-width: 560px; max-height: 90vh;
    overflow-y: auto; overflow-x: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,.25);
    transform: translateY(20px); transition: transform .2s;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-header {
    padding: 20px 24px 16px; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .modal-header h2 { font-size: 1.2rem; font-weight: 700; }
  .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }
  .modal-footer {
    padding: 16px 24px; border-top: 1px solid var(--border);
    display: flex; gap: 10px; justify-content: flex-end;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group label { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
  .form-group input,
  .form-group select,
  .form-group textarea {
    padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: .9rem; font-family: inherit;
    background: var(--bg); outline: none; transition: border-color .15s;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--primary); background: #fff; }
  .form-group textarea { resize: vertical; min-height: 80px; }

  /* ── Deadline countdown ── */
  .deadline-block {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 16px; border-top: 1px solid var(--border);
    background: #fafafa;
  }
  .jj-badge {
    font-size: 1.4rem; font-weight: 900; line-height: 1;
    min-width: 72px; text-align: center; flex-shrink: 0;
    padding: 4px 10px; border-radius: 8px;
  }
  .jj-badge.ok     { color: var(--success); background: #d1fae5; }
  .jj-badge.soon   { color: #92400e;        background: #fef3c7; }
  .jj-badge.urgent { color: var(--danger);  background: #fee2e2; }
  .jj-badge.today  { color: #7c3aed;        background: #ede9fe; }
  .jj-badge.done-badge { color: var(--text-muted); background: #f1f5f9; }

  .timeline-wrap { flex: 1; }
  .timeline-labels {
    display: flex; justify-content: space-between;
    font-size: .7rem; color: var(--text-muted); margin-bottom: 4px;
  }
  .timeline-bar {
    height: 8px; background: var(--border); border-radius: 100px;
    overflow: hidden; position: relative;
  }
  .timeline-fill {
    height: 100%; border-radius: 100px;
    transition: width .4s;
  }
  .timeline-fill.ok     { background: var(--success); }
  .timeline-fill.soon   { background: var(--warning); }
  .timeline-fill.urgent { background: var(--danger); }
  .timeline-fill.done-fill { background: #94a3b8; }
  .timeline-tick {
    position: absolute; top: 0; bottom: 0; width: 2px; background: rgba(0,0,0,.2);
  }

  /* ── Detail Panel (expand) ── */
  .task-detail {
    border-top: 1px solid var(--border);
    display: none;
  }
  .task-detail.open { display: block; }

  .detail-desc {
    padding: 12px 16px 0;
    font-size: .88rem; line-height: 1.6; white-space: pre-wrap;
    color: var(--text-muted); font-style: italic;
    border-bottom: 1px solid var(--border); padding-bottom: 12px;
  }

  /* ── Action log ── */
  .action-log { padding: 14px 16px 4px; }
  .action-log-title {
    font-size: .75rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: .5px; color: var(--text-muted); margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .action-add {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .action-add input {
    flex: 1; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: .88rem; font-family: inherit;
    background: var(--bg); outline: none; transition: border-color .15s;
  }
  .action-add input:focus { border-color: var(--primary); background: #fff; }
  .action-add button {
    padding: 8px 14px; background: var(--primary); color: #fff;
    border: none; border-radius: 8px; font-size: .85rem; font-weight: 600;
    cursor: pointer; white-space: nowrap; transition: background .15s;
  }
  .action-add button:hover { background: var(--primary-dark); }

  .action-entries { display: flex; flex-direction: column; gap: 0; }
  .action-entry {
    display: flex; gap: 12px; align-items: flex-start;
    padding: 8px 0; border-bottom: 1px dashed var(--border);
    position: relative;
  }
  .action-entry:last-child { border-bottom: none; padding-bottom: 12px; }
  .action-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--primary); flex-shrink: 0; margin-top: 5px;
  }
  .action-body { flex: 1; min-width: 0; }
  .action-text { font-size: .88rem; line-height: 1.5; }
  .action-date { font-size: .72rem; color: var(--text-muted); margin-top: 2px; }
  .action-del {
    background: none; border: none; cursor: pointer; color: var(--text-muted);
    font-size: .8rem; padding: 2px 4px; border-radius: 4px; opacity: 0;
    transition: opacity .15s;
  }
  .action-entry:hover .action-del { opacity: 1; }
  .action-del:hover { color: var(--danger); background: #fee2e2; }

  .badge-actions { background: #e0e7ff; color: var(--primary-dark); }

  /* ── Photos ── */
  .photo-section { margin-top: 14px; }
  .photo-section-title { font-size: .8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 8px; }
  .photo-add { display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; }
  .photo-add label {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 7px 14px; background: var(--primary); color: #fff;
    border-radius: 8px; font-size: .85rem; font-weight: 600; cursor: pointer;
    transition: background .15s;
  }
  .photo-add label:hover { background: var(--primary-dark); }
  .photo-add label.cam { background: #0891b2; }
  .photo-add label.cam:hover { background: #0e7490; }
  .photo-grid { display: flex; flex-wrap: wrap; gap: 8px; }
  .photo-thumb {
    position: relative; width: 80px; height: 80px; border-radius: 8px;
    overflow: hidden; border: 2px solid var(--border); cursor: pointer;
    flex-shrink: 0;
  }
  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-del {
    position: absolute; top: 2px; right: 2px; background: rgba(0,0,0,.6);
    color: #fff; border: none; border-radius: 50%; width: 20px; height: 20px;
    font-size: .7rem; cursor: pointer; display: none; align-items: center; justify-content: center;
  }
  .photo-thumb:hover .photo-del { display: flex; }
  /* Lightbox */
  #lightbox { display:none; position:fixed; inset:0; background:rgba(0,0,0,.9); z-index:9999; align-items:center; justify-content:center; }
  #lightbox.open { display:flex; }
  #lightbox img { max-width:95vw; max-height:95vh; border-radius:8px; }
  #lightbox-close { position:absolute; top:16px; right:20px; color:#fff; font-size:2rem; cursor:pointer; background:none; border:none; }

  /* ── History view ── */
  .history-table {
    width: 100%; border-collapse: collapse; font-size: .85rem;
    margin-top: 8px;
  }
  .history-table th {
    background: #f1f5f9; padding: 10px 12px; text-align: left;
    font-size: .75rem; text-transform: uppercase; letter-spacing: .5px;
    color: var(--text-muted); border-bottom: 2px solid var(--border);
  }
  .history-table td {
    padding: 10px 12px; border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .history-table tr:last-child td { border-bottom: none; }
  .history-table tr:hover td { background: #f8fafc; }

  /* ── Empty state ── */
  .empty {
    text-align: center; padding: 60px 20px; color: var(--text-muted);
  }
  .empty .icon { font-size: 3.5rem; margin-bottom: 12px; }
  .empty h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 6px; color: var(--text); }

<!-- Token dialog -->

    </div>
    <div class="modal-body">
      <p style="font-size:.88rem;color:var(--text-muted);line-height:1.6">
        Entrez votre token GitHub pour synchroniser vos tâches sur tous vos appareils.<br>
        Le token est stocké uniquement dans votre navigateur.
      </p>
      <div class="form-group" style="margin-top:8px">
        <label>Token GitHub (ghp_...)</label>

      <button class="btn" style="background:#f1f5f9;color:var(--text)" onclick="closeTokenDialog()">Annuler</button>
      <button class="btn btn-ghost" onclick="closeTokenDialog();pullFromGist()" title="Écraser local avec les données du cloud">📥 Récupérer cloud</button>
      <button class="btn btn-success" onclick="saveToken()">Enregistrer</button>

<!-- Hidden file input for import -->
<input type="file" id="import-file" accept=".xlsx,.xls" style="display:none" onchange="handleImport(event)">

<!-- Toast -->
<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════
   DATA MODEL
   id, title, desc, category, priority,
   assignee, deadline,
   createdAt, closedAt, status (open|done)
═══════════════════════════════════════════ */

let tasks = [];
let editId = null;
let currentTab = 'open';

const STORAGE_KEY = 'todolist_pro_v1';
const GIST_ID    = 'f75f0f1cf7000cd52aee20962fc5ece6';
const GIST_FILE  = 'todo-data.json';
function getToken() { return localStorage.getItem('todo_gh_token') || ''; }

let _syncTimeout = null;
let _syncStatus  = 'idle'; /* idle | saving | error */

function showSyncStatus(status, msg) {
  _syncStatus = status;
  let el = document.getElementById('sync-status');
  if (!el) return;
  const icons = { saving: '🔄', ok: '☁️', error: '⚠️' };
  el.textContent = `${icons[status]||''} ${msg}`;
  el.style.color = status === 'error' ? 'var(--danger)' : status === 'ok' ? 'var(--success)' : '#fff';
}

/* localStorage = source de vérité absolue.
   Le Gist est un miroir cloud mis à jour à chaque save().
   On ne tire du Gist QUE si localStorage est vide (premier lancement sur nouvel appareil). */

async function saveToGist() {
  if (!getToken() || tasks.length === 0) return;
  showSyncStatus('saving', 'Sauvegarde…');
  try {
    const savedAt = new Date().toISOString();
    const body = JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ tasks, savedAt }) } } });
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}`, {
      method: 'PATCH', keepalive: true,
      headers: {
        'Authorization': `token ${getToken()}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json'
      },
      body
    });
    if (!res.ok) throw new Error(res.status);
    showSyncStatus('ok', '✓ Sauvegardé');
  } catch(e) {
    showSyncStatus('error', '⚠️ Erreur sync');
  }
}

async function pullFromGist() {
  /* Tire les données depuis le Gist (synchro manuelle ou nouvel appareil) */
  if (!getToken()) { showSyncStatus('error', '⚙️ Token manquant'); return; }
  showSyncStatus('saving', 'Chargement…');
  try {
    const res = await fetch(`https://api.github.com/gists/${GIST_ID}?_=${Date.now()}`, {
      headers: { 'Authorization': `token ${getToken()}`, 'Accept': 'application/vnd.github.v3+json' },
      cache: 'no-store'
    });
    if (!res.ok) throw new Error(res.status);
    const data = await res.json();
    const content = data.files[GIST_FILE]?.content || '{"tasks":[]}';
    const remote = JSON.parse(content);
    const remoteTasks = remote.tasks || [];
    if (remoteTasks.length > 0) {
      tasks = remoteTasks;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
      showSyncStatus('ok', '✓ Synchronisé');
      render();
    } else {
      showSyncStatus('ok', 'Gist vide');
      render();
    }
  } catch(e) {
    showSyncStatus('error', '⚠️ Hors ligne');
    render();
  }
}

function save() {
  /* Sauvegarde immédiate dans localStorage + envoi async vers Gist */
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  saveToGist();
}

async function forceSave() {
  if (!getToken()) { toast('⚙️ Configure d\'abord le token Sync !'); return; }
  if (tasks.length === 0) { toast('Aucune tâche à sauvegarder.'); return; }
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
  await saveToGist();
  toast('☁️ Sauvegardé !');
}

function load() {
  try { tasks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; } catch { tasks = []; }
  if (tasks.length === 0 && getToken()) {
    /* Nouvel appareil ou cache vidé → tire depuis le Gist */
    pullFromGist();
  } else {
    if (getToken()) showSyncStatus('ok', '✓ Local');
    else showSyncStatus('error', '⚙️ Token manquant');
    render();
  }
}

let _fileHandle = null;

async function saveToFile() {
  const src = document.documentElement.outerHTML;
  const json = JSON.stringify(tasks);
  const updated = src.replace(
    /const EMBEDDED_DATA = .*?; \/\* EMBEDDED_DATA_PLACEHOLDER \*\//,
    `const EMBEDDED_DATA = ${json}; /* EMBEDDED_DATA_PLACEHOLDER */`
  );

  /* File System Access API (Chrome/Edge) — écrase directement le fichier */
  if (window.showSaveFilePicker) {
    try {
      if (!_fileHandle) {
        _fileHandle = await window.showSaveFilePicker({
          suggestedName: 'todo-list.html',
          types: [{ description: 'Fichier HTML', accept: { 'text/html': ['.html'] } }]
        });
      }
      const writable = await _fileHandle.createWritable();
      await writable.write(updated);
      await writable.close();
      toast('✅ Fichier écrasé directement !');
      return;
    } catch (e) {
      if (e.name === 'AbortError') return;
      _fileHandle = null;
    }
  }

  /* Fallback pour Firefox : téléchargement classique */
  const blob = new Blob([updated], { type: 'text/html' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'todo-list.html';
  a.click();
  URL.revokeObjectURL(a.href);
  toast('💿 Téléchargé — remplacez l\'ancien fichier par celui-ci.');
}

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2);
}

/* ── Dates ── */
function fmtDate(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' });
}
function fmtDateTime(iso) {
  if (!iso) return '—';
  const d = new Date(iso);
  return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' });
}
function today() {
  return new Date().toISOString().slice(0, 10);
}
function deadlineDays(deadline) {
  if (!deadline) return null;
  return Math.ceil((new Date(deadline) - new Date(today())) / 86400000);
}

function deadlineStatus(deadline, status) {
  if (!deadline || status === 'done') return null;
  const diff = deadlineDays(deadline);
  if (diff < 0) return 'urgent';
  if (diff <= 3) return 'soon';
  return null;
}

function timelineHtml(t) {
  if (!t.deadline) return '';

  const days = deadlineDays(t.deadline);
  const isDone = t.status === 'done';

  /* J-XX label */
  let jjText, jjClass;
  if (isDone) {
    jjText = '✅ Terminée'; jjClass = 'done-badge';
  } else if (days === 0) {
    jjText = "Aujourd'hui !"; jjClass = 'today';
  } else if (days < 0) {
    jjText = `J+${Math.abs(days)}`; jjClass = 'urgent';
  } else {
    jjText = `J-${days}`; jjClass = days <= 3 ? 'soon' : 'ok';
  }

  /* Progress bar: from createdAt to deadline */
  const start = new Date(t.createdAt);
  const end   = new Date(t.deadline + 'T23:59:59');
  const now   = isDone ? new Date(t.closedAt) : new Date();
  const total = end - start;
  const elapsed = now - start;
  const pct = total > 0 ? Math.min(100, Math.max(0, (elapsed / total) * 100)) : 100;

  const fillClass = isDone ? 'done-fill' : (days < 0 ? 'urgent' : days <= 3 ? 'soon' : 'ok');

  /* Tick at 50% and 75% */
  const ticks = [50, 75].map(p => `<div class="timeline-tick" style="left:${p}%"></div>`).join('');

  return `
  <div class="deadline-block">
    <div class="jj-badge ${jjClass}">${jjText}</div>
    <div class="timeline-wrap">
      <div class="timeline-labels">
        <span>📂 ${fmtDate(t.createdAt)}</span>
        <span>🏁 ${fmtDate(t.deadline)}</span>
      </div>
      <div class="timeline-bar">
        ${ticks}
        <div class="timeline-fill ${fillClass}" style="width:${pct}%"></div>
      </div>
    </div>
  </div>`;
}

/* ══ RENDER ══ */
function setTab(tab, el) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
}

function filterList(statusFilter) {
  const q   = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('filter-cat').value;
  const prio = document.getElementById('filter-prio').value;
  return tasks.filter(t => {
    if (statusFilter === 'open' && t.status !== 'open') return false;
    if (statusFilter === 'done' && t.status !== 'done') return false;
    if (statusFilter === 'all') { /* no filter */ }
    if (cat  && t.category !== cat)  return false;
    if (prio && t.priority !== prio) return false;
    if (q && !t.title.toLowerCase().includes(q) && !(t.desc||'').toLowerCase().includes(q)) return false;
    return true;
  });
}

function sortByDeadline(list) {
  return list.slice().sort((a, b) => {
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
}

function sortByOpThenDeadline(list) {
  const opOrder = { alancer: 0, encours: 1, bloquee: 2 };
  return list.slice().sort((a, b) => {
    const oa = opOrder[a.opStatus||'alancer'];
    const ob = opOrder[b.opStatus||'alancer'];
    if (oa !== ob) return oa - ob;
    if (!a.deadline && !b.deadline) return 0;
    if (!a.deadline) return 1;
    if (!b.deadline) return -1;
    return a.deadline.localeCompare(b.deadline);
  });
}

function colHtml(title, icon, list, emptyMsg) {
  const cards = list.length
    ? list.map(t => taskCard(t)).join('')
    : `<div class="empty" style="padding:30px 10px"><div class="icon" style="font-size:2rem">📭</div><p style="font-size:.85rem">${emptyMsg}</p></div>`;
  return `
    <div>
      <div class="col-header">
        <span style="font-size:1.2rem">${icon}</span>
        <h2>${title}</h2>
        <span class="col-count">${list.length}</span>
      </div>
      <div class="col-tasks">${cards}</div>
    </div>`;
}

function render() {
  updateStats();
  updateCatFilter();

  if (currentTab === 'history') { renderHistory(); return; }

  const container = document.getElementById('task-list');

  /* Tabs terminées / toutes → liste simple pleine largeur */
  if (currentTab === 'done' || currentTab === 'all') {
    const list = sortByDeadline(filterList(currentTab));
    if (!list.length) {
      container.innerHTML = `<div class="empty">
        <div class="icon">${currentTab === 'done' ? '🎉' : '📭'}</div>
        <h3>${currentTab === 'done' ? 'Aucune tâche terminée' : 'Aucune tâche'}</h3>
      </div>`;
      return;
    }
    container.innerHTML = `<div class="col-tasks">${list.map(t => taskCard(t)).join('')}</div>`;
    return;
  }

  /* Onglet Actives → 2 colonnes, sans doublons */
  const base = filterList('open');

  /* Gauche : En cours + Bloquée, triées par deadline */
  const leftList  = sortByDeadline(base.filter(t => (t.opStatus||'alancer') !== 'alancer'));
  /* Droite : À lancer uniquement, triées par deadline */
  const rightList = sortByDeadline(base.filter(t => (t.opStatus||'alancer') === 'alancer'));

  container.innerHTML = `<div class="two-col">
    ${colHtml('En cours &amp; Bloquées', '📅', leftList, 'Aucune tâche en cours ou bloquée')}
    ${colHtml('À lancer', '🔵', rightList, 'Aucune tâche à lancer')}
  </div>`;
}

const OP_STATUS = {
  alancer: { label: 'À lancer',  icon: '🔵' },
  encours: { label: 'En cours',  icon: '🟡' },
  bloquee: { label: 'Bloquée',   icon: '🔴' },
};

function opStatusPanel(t) {
  const cur = t.opStatus || 'alancer';
  return `
  <div class="op-status-panel">
    <div class="panel-lbl">Statut</div>
    ${Object.entries(OP_STATUS).map(([key, {label, icon}]) => `
    <label class="op-radio ${key}">
      <input type="radio" name="ops-${t.id}" value="${key}" ${cur===key?'checked':''} onchange="setOpStatus('${t.id}','${key}')">
      <div class="op-radio-dot"></div>
      <span class="op-radio-label">${icon} ${label}</span>
    </label>`).join('')}
  </div>`;
}

function taskCard(t) {
  const ds = deadlineStatus(t.deadline, t.status);
  const isOverdue = ds === 'urgent';
  const prioLabel = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };
  const prioIcon  = { high: '🔴', medium: '🟡', low: '🟢' };
  const ops = t.opStatus || 'alancer';
  const opsInfo = OP_STATUS[ops];
  /* Calcul J-XX pour le chip compact */
  let daysLabel = '';
  if (t.deadline) {
    const diff = Math.ceil((new Date(t.deadline) - new Date()) / 86400000);
    if (t.status === 'done') daysLabel = '✅';
    else if (diff < 0)  daysLabel = `J+${Math.abs(diff)}`;
    else if (diff === 0) daysLabel = 'Auj.';
    else daysLabel = `J-${diff}`;
  }

  return `
  <div class="task-card ${t.status === 'done' ? 'done' : ''} ${isOverdue && t.status !== 'done' ? 'overdue' : ''} priority-${t.priority}" id="card-${t.id}">
    <div class="task-card-top">
      <div class="task-card-body">
        <!-- Ligne compacte : checkbox + titre + J-XX + boutons + flèche -->
        <div class="task-header">
          <div class="task-check ${t.status === 'done' ? 'checked' : ''}" onclick="toggleDone('${t.id}')" title="${t.status === 'done' ? 'Réouvrir' : 'Marquer terminé'}"></div>
          <div class="task-title" onclick="toggleDetail('${t.id}')">${escHtml(t.title)}</div>
          ${t.deadline ? `<span class="task-deadline-chip ${ds||''}">${daysLabel}</span>` : ''}
          ${(t.actions||[]).length ? `<span style="font-size:.7rem;color:var(--text-muted);flex-shrink:0">⚡${t.actions.length}</span>` : ''}
          ${(t.photos||[]).length  ? `<span style="font-size:.7rem;color:var(--text-muted);flex-shrink:0">📷${t.photos.length}</span>` : ''}
          <button class="icon-btn" onclick="openModal('${t.id}')" title="Modifier" style="flex-shrink:0">✏️</button>
          <button class="icon-btn del" onclick="deleteTask('${t.id}')" title="Supprimer" style="flex-shrink:0">🗑</button>
          <button class="task-toggle-btn" id="toggle-btn-${t.id}" onclick="toggleDetail('${t.id}')" title="Voir détails">▼</button>
        </div>
      </div>
      ${t.status !== 'done' ? opStatusPanel(t) : ''}
    </div>
    <!-- Détail dépliable -->
    <div class="task-detail" id="detail-${t.id}">
      <div style="padding:0 12px 4px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        ${t.category ? `<span class="badge badge-cat">📁 ${escHtml(t.category)}</span>` : ''}
        <span class="badge badge-prio-${t.priority}">${prioIcon[t.priority]} ${prioLabel[t.priority]}</span>
        ${t.status !== 'done' ? `<span class="op-pill ${ops}">${opsInfo.icon} ${opsInfo.label}</span>` : ''}
        ${t.deadline ? `<span class="badge badge-deadline ${ds||''}">📅 ${fmtDate(t.deadline)}</span>` : ''}
        ${t.assignee ? `<span class="badge" style="background:#f1f5f9;color:var(--text-muted)">👤 ${escHtml(t.assignee)}</span>` : ''}
      </div>
      ${t.desc ? `<div class="detail-desc">${escHtml(t.desc)}</div>` : ''}
      ${timelineHtml(t)}
      <div class="task-footer">
        <span>📂 ${fmtDateTime(t.createdAt)}</span>
        ${t.closedAt ? `<span>🔒 ${fmtDateTime(t.closedAt)}</span>` : ''}
      </div>
      <div class="action-log">
        <div class="action-log-title">⚡ Journal d'actions</div>
        <div class="action-add">
          <input type="text" id="action-input-${t.id}" placeholder="Ajouter une action / réalisation…" onkeydown="if(event.key==='Enter')addAction('${t.id}')">
          <button onclick="addAction('${t.id}')">+ Ajouter</button>
        </div>
        <div class="action-entries" id="action-entries-${t.id}">
          ${renderActionEntries(t)}
        </div>
      </div>
      <div class="photo-section">
        <div class="photo-section-title">📷 Photos</div>
        <div class="photo-add">
          <label class="cam" title="Prendre une photo">
            📷 Appareil photo
            <input type="file" accept="image/*" capture="environment" style="display:none" onchange="addPhoto('${t.id}',this)">
          </label>
          <label title="Choisir depuis la galerie">
            🖼 Galerie
            <input type="file" accept="image/*" style="display:none" onchange="addPhoto('${t.id}',this)">
          </label>
        </div>
        <div class="photo-grid" id="photo-grid-${t.id}">
          ${renderPhotos(t)}
        </div>
      </div>
    </div>
  </div>`;
}

function setOpStatus(taskId, status) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  t.opStatus = status;
  save();
  render();
}

function toggleDetail(id) {
  const el  = document.getElementById('detail-' + id);
  const btn = document.getElementById('toggle-btn-' + id);
  el.classList.toggle('open');
  const isOpen = el.classList.contains('open');
  if (btn) { btn.textContent = isOpen ? '▲' : '▼'; btn.classList.toggle('open', isOpen); }
  if (isOpen) {
    setTimeout(() => {
      const inp = document.getElementById('action-input-' + id);
      if (inp) inp.focus();
    }, 50);
  }
}

function renderActionEntries(t) {
  const actions = (t.actions || []).slice().reverse();
  if (!actions.length) return '<div style="font-size:.82rem;color:var(--text-muted);padding-bottom:8px;font-style:italic">Aucune action enregistrée.</div>';
  return actions.map(a => `
    <div class="action-entry">
      <div class="action-dot"></div>
      <div class="action-body">
        <div class="action-text">${escHtml(a.text)}</div>
        <div class="action-date">🕐 ${fmtDateTime(a.date)}</div>
      </div>
      <button class="action-del" onclick="deleteAction('${t.id}','${a.id}')" title="Supprimer">✕</button>
    </div>`).join('');
}

function addAction(taskId) {
  const inp = document.getElementById('action-input-' + taskId);
  const text = inp.value.trim();
  if (!text) { inp.style.borderColor = 'var(--danger)'; setTimeout(()=>inp.style.borderColor='',1200); return; }
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  if (!t.actions) t.actions = [];
  t.actions.push({ id: uid(), text, date: new Date().toISOString() });
  inp.value = '';
  save();
  /* Mise à jour partielle sans re-render complet */
  const entries = document.getElementById('action-entries-' + taskId);
  if (entries) entries.innerHTML = renderActionEntries(t);
  /* Mettre à jour le badge compteur */
  const card = document.getElementById('card-' + taskId);
  if (card) {
    const badges = card.querySelector('.task-badges');
    let badgeEl = badges.querySelector('.badge-actions');
    const cnt = t.actions.length;
    if (badgeEl) {
      badgeEl.textContent = `⚡ ${cnt} action${cnt>1?'s':''}`;
    } else {
      const span = document.createElement('span');
      span.className = 'badge badge-actions';
      span.style.cursor = 'pointer';
      span.onclick = () => toggleDetail(taskId);
      span.textContent = `⚡ ${cnt} action${cnt>1?'s':''}`;
      badges.appendChild(span);
    }
  }
  inp.focus();
}

function deleteAction(taskId, actionId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  t.actions = (t.actions || []).filter(a => a.id !== actionId);
  save();
  const entries = document.getElementById('action-entries-' + taskId);
  if (entries) entries.innerHTML = renderActionEntries(t);
  const card = document.getElementById('card-' + taskId);
  if (card) {
    const badgeEl = card.querySelector('.badge-actions');
    const cnt = t.actions.length;
    if (cnt === 0 && badgeEl) badgeEl.remove();
    else if (badgeEl) badgeEl.textContent = `⚡ ${cnt} action${cnt>1?'s':''}`;
  }
}

/* ── History ── */
function renderHistory() {
  const done = tasks.filter(t => t.status === 'done').sort((a,b) => new Date(b.closedAt) - new Date(a.closedAt));
  const container = document.getElementById('task-list');
  if (!done.length) {
    container.innerHTML = `<div class="empty"><div class="icon">📜</div><h3>Aucun historique</h3><p>Les tâches terminées apparaîtront ici.</p></div>`;
    return;
  }
  const rows = done.map(t => `
    <tr>
      <td><strong>${escHtml(t.title)}</strong></td>
      <td>${escHtml(t.category||'—')}</td>
      <td>${fmtDate(t.deadline)||'—'}</td>
      <td>${fmtDateTime(t.createdAt)}</td>
      <td>${fmtDateTime(t.closedAt)}</td>
      <td>${duration(t.createdAt, t.closedAt)}</td>
      <td>
        <button class="btn btn-sm" style="background:#e0e7ff;color:var(--primary)" onclick="reopen('${t.id}')">🔄 Réouvrir</button>
      </td>
    </tr>`).join('');
  container.innerHTML = `
    <table class="history-table">
      <thead><tr>
        <th>Titre</th><th>Catégorie</th><th>Deadline</th>
        <th>Ouverte</th><th>Fermée</th><th>Durée</th><th></th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

function duration(open, closed) {
  if (!open || !closed) return '—';
  const ms = new Date(closed) - new Date(open);
  const d = Math.floor(ms / 86400000);
  const h = Math.floor((ms % 86400000) / 3600000);
  if (d > 0) return `${d}j ${h}h`;
  return `${h}h`;
}

/* ── Stats & filters ── */
function updateStats() {
  const open = tasks.filter(t => t.status === 'open').length;
  const done = tasks.filter(t => t.status === 'done').length;
  const overdue = tasks.filter(t => t.status === 'open' && t.deadline && t.deadline < today()).length;
  document.getElementById('stat-open').textContent = open;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-overdue').textContent = overdue;
  document.getElementById('stat-total').textContent = tasks.length;
}

function updateCatFilter() {
  const cats = [...new Set(tasks.map(t => t.category).filter(Boolean))].sort();
  const sel = document.getElementById('filter-cat');
  const cur = sel.value;
  sel.innerHTML = '<option value="">Toutes catégories</option>' + cats.map(c => `<option value="${escHtml(c)}" ${c===cur?'selected':''}>${escHtml(c)}</option>`).join('');

function toggleDone(id) {
  const t = tasks.find(x => x.id === id);

  if (t.status === 'open') {
    t.status = 'done';

function reopen(id) {
  const t = tasks.find(x => x.id === id);

}

function deleteTask(id) {
  if (!confirm('Supprimer cette tâche définitivement ?')) return;
  tasks = tasks.filter(t => t.id !== id);

  toast('Tâche supprimée 🗑');
}

let _modalPhotos = []; /* photos en attente dans le modal */

function renderModalPhotos() {
  document.getElementById('modal-photo-grid').innerHTML = _modalPhotos.map(p => `
    <div class="photo-thumb">
      <img src="${p.data}" alt="">
      <button class="photo-del" onclick="removeModalPhoto('${p.id}')">✕</button>
    </div>`).join('');
}
function removeModalPhoto(pid) {

function addModalPhoto(input) {
  compressFile(input.files[0], d => {
    _modalPhotos.push({ id: uid(), data: d, date: new Date().toISOString() });
    renderModalPhotos();
    input.value = '';
  });
}

function compressFile(file, cb) {
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      const MAX = 800;
      let w = img.width, h = img.height;
      if (w > MAX || h > MAX) {
        if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
        else       { w = Math.round(w * MAX / h); h = MAX; }
      }
      const c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      cb(c.toDataURL('image/jpeg', 0.75));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function openModal(id) {
  editId = id || null;
  _modalPhotos = [];
  const overlay = document.getElementById('modal-overlay');
  document.getElementById('modal-title').textContent = editId ? 'Modifier la tâche' : 'Nouvelle tâche';

  if (editId) {
    const t = tasks.find(x => x.id === editId);
    document.getElementById('f-title').value    = t.title;
    document.getElementById('f-desc').value     = t.desc || '';
    document.getElementById('f-cat').value      = t.category || '';
    document.getElementById('f-prio').value     = t.priority;
    document.getElementById('f-deadline').value = t.deadline || '';
    document.getElementById('f-assignee').value = t.assignee || '';
    _modalPhotos = (t.photos || []).map(p => ({...p}));
  } else {
    document.getElementById('f-title').value    = '';
    document.getElementById('f-desc').value     = '';
    document.getElementById('f-cat').value      = '';
    document.getElementById('f-prio').value     = 'medium';
    document.getElementById('f-deadline').value = '';
    document.getElementById('f-assignee').value = '';
  }
  renderModalPhotos();
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('f-title').focus(), 50);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { document.getElementById('f-title').focus(); shake('f-title'); return; }

  if (editId) {
    const t = tasks.find(x => x.id === editId);
    t.title    = title;
    t.desc     = document.getElementById('f-desc').value.trim();
    t.category = document.getElementById('f-cat').value.trim();
    t.priority = document.getElementById('f-prio').value;
    t.deadline = document.getElementById('f-deadline').value;
    t.assignee = document.getElementById('f-assignee').value.trim();
    t.photos   = _modalPhotos;
    toast('Tâche modifiée ✏️');
  } else {
    tasks.push({
      id: uid(),
      title,
      desc:     document.getElementById('f-desc').value.trim(),
      category: document.getElementById('f-cat').value.trim(),
      priority: document.getElementById('f-prio').value,
      deadline: document.getElementById('f-deadline').value,
      assignee: document.getElementById('f-assignee').value.trim(),
      createdAt: new Date().toISOString(),
      closedAt:  null,
      status:    'open',
      opStatus:  'alancer',
      actions:   [],
      photos:    _modalPhotos
    });
    toast('Tâche créée 🎉');
  }
  save(); closeModal(); render();
}

/* ══ EXCEL EXPORT ══ */
function exportExcel() {
  if (!tasks.length) { toast('Aucune tâche à exporter !'); return; }

  const prioMap = { high: 'Haute', medium: 'Moyenne', low: 'Basse' };
  const statusMap = { open: 'En cours', done: 'Terminée' };

  const rows = tasks.map(t => ({
    'ID':          t.id,
    'Titre':       t.title,
    'Description': t.desc || '',
    'Catégorie':   t.category || '',
    'Priorité':    prioMap[t.priority] || t.priority,
    'Assigné à':   t.assignee || '',
    'Deadline':    t.deadline || '',
    'Statut':      statusMap[t.status] || t.status,
    'Avancement':  (OP_STATUS[t.opStatus] || OP_STATUS.alancer).label,
    'Date ouverture': t.createdAt ? fmtDateTime(t.createdAt) : '',
    'Date fermeture': t.closedAt  ? fmtDateTime(t.closedAt)  : '',
    'Actions':        (t.actions||[]).map(a => `[${fmtDateTime(a.date)}] ${a.text}`).join('\n'),
  }));

  const ws = XLSX.utils.json_to_sheet(rows);

  /* Column widths */
  ws['!cols'] = [
    {wch:20},{wch:35},{wch:45},{wch:18},{wch:12},
    {wch:18},{wch:14},{wch:12},{wch:22},{wch:22},{wch:60}
  ];

  /* Header style */
  const headerRange = XLSX.utils.decode_range(ws['!ref']);
  for (let c = headerRange.s.c; c <= headerRange.e.c; c++) {
    const cell = ws[XLSX.utils.encode_cell({r:0, c})];
    if (cell) cell.s = { font: { bold: true }, fill: { fgColor: { rgb: "4F46E5" } } };
  }

  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'To Do List');

  /* Second sheet: summary */
  const open   = tasks.filter(t => t.status === 'open').length;
  const done   = tasks.filter(t => t.status === 'done').length;
  const overdue = tasks.filter(t => t.status === 'open' && t.deadline && t.deadline < today()).length;
  const sumWs = XLSX.utils.aoa_to_sheet([
    ['Résumé', ''],
    ['Total tâches', tasks.length],
    ['En cours',     open],
    ['Terminées',    done],
    ['En retard',    overdue],
    ['Exporté le',   fmtDateTime(new Date().toISOString())],
  ]);
  sumWs['!cols'] = [{wch:20},{wch:20}];
  XLSX.utils.book_append_sheet(wb, sumWs, 'Résumé');

  const date = new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb, `todo_list_${date}.xlsx`);
  toast('Fichier Excel exporté 💾');
}

/* ══ EXCEL IMPORT ══ */
function importExcel() {
  document.getElementById('import-file').click();
}

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const wb = XLSX.read(ev.target.result, { type: 'binary' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws);

      const prioMap = { 'Haute': 'high', 'Moyenne': 'medium', 'Basse': 'low' };
      const statusMap = { 'En cours': 'open', 'Terminée': 'done' };

      let imported = 0, skipped = 0;
      rows.forEach(r => {
        if (!r['Titre']) { skipped++; return; }
        const id = r['ID'] || uid();
        const existing = tasks.find(t => t.id === id);
        const task = {
          id,
          title:     r['Titre'] || '',
          desc:      r['Description'] || '',
          category:  r['Catégorie'] || '',
          priority:  prioMap[r['Priorité']] || 'medium',
          assignee:  r['Assigné à'] || '',
          deadline:  r['Deadline'] || '',
          status:    statusMap[r['Statut']] || 'open',
          createdAt: existing ? existing.createdAt : new Date().toISOString(),
          closedAt:  r['Date fermeture'] && r['Date fermeture'] !== '—' ? existing?.closedAt || new Date().toISOString() : null,
          actions:   existing ? existing.actions : [],
        };
        if (existing) { Object.assign(existing, task); } else { tasks.push(task); imported++; }
      });
      save();
      render();
      toast(`Import terminé : ${imported} ajoutée(s), ${rows.length - imported - skipped} mise(s) à jour.`);
    } catch (err) {
      toast('Erreur lors de l\'import Excel ❌');
      console.error(err);
    }
    e.target.value = '';
  };
  reader.readAsBinaryString(file);
}

}

function toast(msg) {

function shake(id) {

}

    _flashPhotos.push({ id: uid(), data: d, date: new Date().toISOString() });
    document.getElementById('flash-photo-grid').innerHTML = _flashPhotos.map(p => `
      <div class="photo-thumb"><img src="${p.data}" alt=""></div>`).join('');
    input.value = '';
  });
}
function saveFlash() {
  const title = document.getElementById('flash-title').value.trim();
  if (!title) { document.getElementById('flash-title').focus(); shake('flash-title'); return; }
  tasks.push({
    id: uid(), title,
    desc: '', category: '', priority: 'medium', deadline: '', assignee: '',
    createdAt: new Date().toISOString(), closedAt: null,
    status: 'open', opStatus: 'alancer',
    actions: [], photos: [..._flashPhotos]
  });
  save(); closeFlash(); render();
  toast('⚡ Tâche flash créée !');
}

/* ── Photos ── */
function renderPhotos(t) {
  return (t.photos || []).map(p => `
    <div class="photo-thumb" id="pthumb-${p.id}">
      <img src="${p.data}" alt="photo" onclick="openLightbox('${p.data}')">
      <button class="photo-del" onclick="deletePhoto('${t.id}','${p.id}')">✕</button>
    </div>`).join('');
}

function addPhoto(taskId, input) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  compressFile(input.files[0], d => {
    if (!t.photos) t.photos = [];
    t.photos.push({ id: uid(), data: d, date: new Date().toISOString() });
    save();
    const grid = document.getElementById('photo-grid-' + taskId);
    if (grid) grid.innerHTML = renderPhotos(t);
    input.value = '';
  });
}

function deletePhoto(taskId, photoId) {
  const t = tasks.find(x => x.id === taskId);
  if (!t) return;
  t.photos = (t.photos || []).filter(p => p.id !== photoId);
  save();
  const grid = document.getElementById('photo-grid-' + taskId);
  if (grid) grid.innerHTML = renderPhotos(t);
}

function openLightbox(src) {
  const lb = document.getElementById('lightbox');
  document.getElementById('lightbox-img').src = src;
  lb.classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
</script>

<div id="lightbox" onclick="if(event.target===this)closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>
</body>
</html>
