<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#4f46e5"/>
    </linearGradient>
    <linearGradient id="bolt" x1="20%" y1="0%" x2="80%" y2="100%">
      <stop offset="0%" style="stop-color:#fff7ed"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>
  <!-- Lightning bolt — grand et centré -->
  <polygon points="300,30 160,290 240,290 212,482 368,210 280,210 330,30"
           fill="url(#bolt)" filter="url(#glow)"/>
  <!-- Tasks -->
  <text x="256" y="478" font-family="'Helvetica Neue', Arial, sans-serif"
        font-weight="700" font-size="66" text-anchor="middle"
        fill="rgba(255,255,255,0.75)" letter-spacing="6">Tasks</text>
</svg>
